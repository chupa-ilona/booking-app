server.port=8088
spring.datasource.url=jdbc:mysql://localhost:3307/booking_db?serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.liquibase.change-log=db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

stripe.secret.key=${STRIPE_SECRET_KEY}

jwt.secret=${JWT_SECRET}
jwt.expiration=36000000

telegram.bot.name=Accommodation_Booking_Application
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.chat.id=${TELEGRAM_CHAT_ID}


springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.info.title=Accommodation Booking API
springdoc.info.version=1.0
springdoc.info.description=Accommodation Booking Service with Telegram bot for posting notifications
